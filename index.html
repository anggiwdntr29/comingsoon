<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NataJivva — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest-green: #3F5B4A;
      --sage-green: #A8B5A2;
      --warm-beige: #F3EBDD;
      --sand: #DCCCB4;
      --terracotta: #B97858;
      --dusty-gold: #B89B6A;
      --slate-blue: #6F8798;
      --charcoal: #2F2F2F;
      --warm-white: #FCFAF6;
      --soft-gray: #E8E5DF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--warm-white);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background:
        radial-gradient(circle at 15% 20%, rgba(168,181,162,0.25), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(220,204,180,0.35), transparent 45%),
        var(--warm-white);
    }

    .container { max-width: 640px; }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: var(--forest-green);
      color: var(--warm-beige);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 12px 30px rgba(63,91,74,0.25);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 600;
      color: var(--forest-green);
      line-height: 1;
      letter-spacing: 1px;
    }

    .tagline {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: var(--terracotta);
      margin-top: 0.75rem;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--sage-green);
      margin-top: 1.5rem;
    }

    .taglines {
      margin-top: 1rem;
      color: var(--slate-blue);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--dusty-gold);
      border-radius: 3px;
      margin: 2.5rem auto;
    }

    .coming-soon {
      display: inline-block;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-size: 1.1rem;
      color: var(--warm-white);
      background: var(--forest-green);
      padding: 0.9rem 2.5rem;
      border-radius: 999px;
    }

    .note {
      margin-top: 2rem;
      color: var(--slate-blue);
      font-size: 0.95rem;
      font-weight: 300;
    }

    .lang-switch {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.4rem;
      background: var(--soft-gray);
      padding: 0.3rem;
      border-radius: 999px;
    }

    .lang-switch button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--charcoal);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .lang-switch button.active {
      background: var(--forest-green);
      color: var(--warm-white);
    }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button id="btn-id" onclick="setLang('id')">ID</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="container">
    <div class="logo">N</div>
    <h1>NataJivva</h1>
    <p class="tagline" data-id="Bersama Mewujudkan Riset yang Berkualitas." data-en="Together Realizing Quality Research."></p>
    <p class="taglines"
       data-id="Mendampingi Setiap Langkah Perjalanan Akademik Anda.<br>Pendampingan Akademik dari Awal hingga Tuntas."
       data-en="Guiding Every Step of Your Academic Journey.<br>Academic Support from Start to Finish."></p>

    <div class="divider"></div>

    <span class="coming-soon" data-id="Segera Hadir" data-en="Coming Soon"></span>

    <p class="note" data-id="Kami sedang mempersiapkan sesuatu yang istimewa untuk Anda." data-en="We are preparing something special for you."></p>
  </div>

  <script>
    function setLang(lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-' + lang + ']').forEach(function (el) {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
      document.getElementById('btn-id').classList.toggle('active', lang === 'id');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      localStorage.setItem('natajivva-lang', lang);
    }
    setLang(localStorage.getItem('natajivva-lang') || 'id');
  </script>
</body>
</html>
