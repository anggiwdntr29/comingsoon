<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NataJivva — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest-green: #3F5B4A;
      --sage-green: #A8B5A2;
      --warm-beige: #F3EBDD;
      --sand: #DCCCB4;
      --terracotta: #B97858;
      --dusty-gold: #B89B6A;
      --slate-blue: #6F8798;
      --charcoal: #2F2F2F;
      --warm-white: #FCFAF6;
      --soft-gray: #E8E5DF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--warm-white);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 15% 20%, rgba(168,181,162,0.25), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(220,204,180,0.35), transparent 45%),
        var(--warm-white);
    }

    .container { max-width: 640px; position: relative; z-index: 2; }

    /* Aksen daun & tanaman */
    .leaf-decor {
      position: fixed;
      pointer-events: none;
      z-index: 1;
    }
    .leaf-top-left  { top: -40px; left: -40px; width: 320px; transform: rotate(-10deg); opacity: 0.55; }
    .leaf-bottom-right { bottom: -50px; right: -50px; width: 340px; transform: rotate(160deg); opacity: 0.45; }
    .plant-behind {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .leaf-top-left { width: 200px; }
      .leaf-bottom-right { width: 210px; }
      .plant-behind { width: 220px; }
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: var(--forest-green);
      color: var(--warm-beige);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 12px 30px rgba(63,91,74,0.25);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 600;
      color: var(--forest-green);
      line-height: 1;
      letter-spacing: 1px;
    }

    .tagline {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: var(--terracotta);
      margin-top: 0.75rem;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--sage-green);
      margin-top: 1.5rem;
    }

    .taglines {
      margin-top: 1rem;
      color: var(--slate-blue);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--dusty-gold);
      border-radius: 3px;
      margin: 2.5rem auto;
    }

    .coming-soon {
      display: inline-block;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-size: 1.1rem;
      color: var(--warm-white);
      background: var(--forest-green);
      padding: 0.9rem 2.5rem;
      border-radius: 999px;
    }

    .note {
      margin-top: 2rem;
      color: var(--slate-blue);
      font-size: 0.95rem;
      font-weight: 300;
    }

    .lang-switch {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.4rem;
      background: var(--soft-gray);
      padding: 0.3rem;
      border-radius: 999px;
    }

    .lang-switch button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--charcoal);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .lang-switch button.active {
      background: var(--forest-green);
      color: var(--warm-white);
    }
  </style>
</head>
<body>
  <!-- Aksen daun (line-art) pojok kiri atas -->
  <svg class="leaf-decor leaf-top-left" viewBox="0 0 200 200" fill="none" stroke="#3F5B4A" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 180 C60 120 100 80 180 30"/>
    <path d="M70 118 C60 95 75 70 105 65 C95 90 90 110 78 122 Z" fill="#A8B5A2" fill-opacity="0.35"/>
    <path d="M95 92 C90 68 110 45 140 44 C128 68 120 88 106 98 Z" fill="#A8B5A2" fill-opacity="0.35"/>
    <path d="M120 70 C118 46 140 26 170 28 C156 50 146 68 132 76 Z" fill="#A8B5A2" fill-opacity="0.35"/>
    <path d="M55 140 C40 128 30 108 38 90 C55 100 68 118 66 138 Z" fill="#A8B5A2" fill-opacity="0.35"/>
  </svg>

  <!-- Aksen daun pojok kanan bawah -->
  <svg class="leaf-decor leaf-bottom-right" viewBox="0 0 200 200" fill="none" stroke="#B89B6A" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 180 C60 120 100 80 180 30"/>
    <path d="M70 118 C60 95 75 70 105 65 C95 90 90 110 78 122 Z" fill="#DCCCB4" fill-opacity="0.4"/>
    <path d="M95 92 C90 68 110 45 140 44 C128 68 120 88 106 98 Z" fill="#DCCCB4" fill-opacity="0.4"/>
    <path d="M120 70 C118 46 140 26 170 28 C156 50 146 68 132 76 Z" fill="#DCCCB4" fill-opacity="0.4"/>
  </svg>

  <!-- Tanaman line-art di tengah bawah -->
  <svg class="plant-behind" viewBox="0 0 200 260" fill="none" stroke="#3F5B4A" stroke-width="1.4" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="215" r="42" fill="#6B6B4E" stroke="none"/>
    <path d="M100 240 C100 180 100 120 100 60"/>
    <path d="M100 150 C70 140 55 115 60 88 C90 98 108 120 100 150 Z"/>
    <path d="M100 130 C130 120 148 95 143 68 C112 78 92 100 100 130 Z"/>
    <path d="M100 100 C78 92 66 72 70 52 C92 60 106 78 100 100 Z"/>
    <path d="M100 90 C122 82 136 62 132 44 C110 52 96 70 100 90 Z"/>
    <path d="M100 70 C88 58 86 40 96 28 C108 42 110 60 100 70 Z"/>
  </svg>

  <div class="lang-switch">
    <button id="btn-id" onclick="setLang('id')">ID</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="container">
    <div class="logo">N</div>
    <h1>NataJivva</h1>
    <p class="tagline" data-id="Bersama Mewujudkan Riset yang Berkualitas." data-en="Together Realizing Quality Research."></p>
    <p class="taglines"
       data-id="Mendampingi Setiap Langkah Perjalanan Akademik Anda.<br>Pendampingan Akademik dari Awal hingga Tuntas."
       data-en="Guiding Every Step of Your Academic Journey.<br>Academic Support from Start to Finish."></p>

    <div class="divider"></div>

    <span class="coming-soon" data-id="Segera Hadir" data-en="Coming Soon"></span>

    <p class="note" data-id="Kami sedang mempersiapkan sesuatu yang istimewa untuk Anda." data-en="We are preparing something special for you."></p>
  </div>

  <script>
    function setLang(lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-' + lang + ']').forEach(function (el) {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
      document.getElementById('btn-id').classList.toggle('active', lang === 'id');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      localStorage.setItem('natajivva-lang', lang);
    }
    setLang(localStorage.getItem('natajivva-lang') || 'id');
  </script>
</body>
</html>
